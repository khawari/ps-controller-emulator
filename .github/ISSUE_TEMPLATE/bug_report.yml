name: Bug report
description: Report a reproducible problem in PS Controller Emulator.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Open the app
        2. Connect controller over USB
        3. Press Refresh
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version or commit
    validations:
      required: false
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or CLI output
      render: text
